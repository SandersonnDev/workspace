<div class="settings-modal hidden" id="settingsModal">
    <div class="settings-modal-overlay" id="settingsModalOverlay"></div>
    <div class="settings-modal-container">
        <div class="settings-modal-header">
            <button class="settings-modal-close" id="settingsModalClose" type="button" aria-label="Fermer">
                <i class="fas fa-times"></i>
            </button>
            <h2 class="settings-modal-title"><i class="fas fa-user-cog"></i> Paramètres du compte</h2>
        </div>
        <div class="settings-modal-body">
        <div class="settings-section">
            <h3>Changer le pseudo</h3>
            <form id="settingsFormUsername" class="settings-form">
                <div class="form-group">
                    <label for="settingsNewUsername">Nouveau pseudo</label>
                    <input type="text" id="settingsNewUsername" name="username" minlength="3" maxlength="20" pattern="^[a-zA-Z0-9_-]+$" placeholder="3-20 caractères (lettres, chiffres, _ et -)">
                </div>
                <div class="settings-error hidden" id="settingsUsernameError"></div>
                <button type="submit" class="btn btn-primary">Enregistrer le pseudo</button>
            </form>
        </div>

        <div class="settings-section">
            <h3>Changer le mot de passe</h3>
            <form id="settingsFormPassword" class="settings-form">
                <div class="form-group">
                    <label for="settingsCurrentPassword">Mot de passe actuel</label>
                    <input type="password" id="settingsCurrentPassword" name="currentPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="settingsNewPassword">Nouveau mot de passe</label>
                    <input type="password" id="settingsNewPassword" name="newPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="settingsNewPasswordConfirm">Confirmer le nouveau mot de passe</label>
                    <input type="password" id="settingsNewPasswordConfirm" name="newPasswordConfirm" required minlength="6">
                </div>
                <div class="settings-error hidden" id="settingsPasswordError"></div>
                <button type="submit" class="btn btn-primary">Changer le mot de passe</button>
            </form>
        </div>

        <div class="settings-section settings-section-danger">
            <h3>Supprimer le compte</h3>
            <p class="settings-warning">Cette action est irréversible. Toutes vos données seront supprimées.</p>
            <button type="button" id="settingsBtnDeleteAccount" class="btn btn-danger">Supprimer mon compte</button>
            <div class="settings-error hidden" id="settingsDeleteError"></div>
        </div>

        <div id="settingsDeleteConfirm" class="settings-delete-confirm hidden">
            <p>Êtes-vous sûr de vouloir supprimer votre compte ? Saisissez votre mot de passe pour confirmer.</p>
            <div class="form-group">
                <label for="settingsDeletePassword">Mot de passe</label>
                <input type="password" id="settingsDeletePassword" placeholder="Votre mot de passe">
            </div>
            <div class="settings-error hidden" id="settingsDeleteConfirmError"></div>
            <div class="settings-delete-actions">
                <button type="button" id="settingsDeleteConfirmBtn" class="btn btn-danger">Confirmer la suppression</button>
                <button type="button" id="settingsDeleteCancelBtn" class="btn btn-secondary">Annuler</button>
            </div>
        </div>
        </div>
    </div>
</div>
