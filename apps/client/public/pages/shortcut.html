<section class="shortcut section">
    <div class="section-title shortcut-section-title">
        <h2>Mes raccourcis</h2>
        <div class="shortcut-toolbar">
            <div class="shortcut-search-wrap">
                <i class="fas fa-search" aria-hidden="true"></i>
                <input type="search" id="shortcut-search-input" class="shortcut-search-input" placeholder="Rechercher… (Ctrl+F)" autocomplete="off" aria-label="Rechercher un raccourci">
            </div>
            <button type="button" id="add-category-btn" class="shortcut-add-category-btn" title="Créer une nouvelle catégorie">
                <i class="fas fa-plus"></i> Nouvelle catégorie
            </button>
        </div>
    </div>

    <div id="shortcut-auth-required" class="shortcut-auth-required hidden">
        <i class="fa-solid fa-lock"></i>
        <h3>Authentification requise</h3>
        <p>Vous devez être connecté pour gérer vos raccourcis.</p>
        <button type="button" id="shortcut-login-btn" class="shortcut-login-btn">Se connecter</button>
    </div>

    <div id="shortcut-content" class="shortcut-content">
        <div class="section-contain">
            <div id="shortcut-grid" class="shortcut-grid grid"></div>
        </div>
    </div>
</section>
