<section class="recep-page lot-page inventaire-container">
    <div class="lot-page__body">
        <div class="lot-card lot-card--config">
            <div class="lot-card__inner">
                <div class="lot-config">
                    <div class="lot-config__field">
                        <label class="lot-config__label" for="filter-state"><i class="fa-solid fa-filter" aria-hidden="true"></i> État :</label>
                        <select class="lot-config__input" id="filter-state">
                            <option value="">Tous les états</option>
                            <option value="Reconditionnés">Reconditionnés</option>
                            <option value="Pour pièces">Pour pièces</option>
                            <option value="HS">HS</option>
                            <option value="Non défini">Non défini</option>
                        </select>
                    </div>
                    <div class="lot-config__actions">
                        <button type="button" class="lot-btn lot-btn--primary" id="btn-refresh-lots" title="Recharger la liste des lots">
                            <i class="fa-solid fa-sync" aria-hidden="true"></i> Rafraîchir
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lot-card lot-card--list">
                <div class="recep-list lots-list-inv" id="lots-list">
                    <div class="recep-loading loading">
                        <i class="fa-solid fa-spinner" aria-hidden="true"></i>
                        <span>Chargement des lots...</span>
                    </div>
                </div>
            </div>
        </div>
</section>

<dialog class="universal-modal" id="modal-edit-pc" data-modal-id="modal-edit-pc">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fa-solid fa-computer"></i> Éditer PC</h2>
            <button type="button" class="modal-close-btn" data-modal-close="modal-edit-pc" title="Fermer sans enregistrer" aria-label="Fermer"><i class="fa-solid fa-times" aria-hidden="true"></i></button>
        </div>
        <div class="modal-body">
            <div class="recep-info-box pc-info-box">
                <div class="recep-info-row info-row">
                    <span class="recep-info-label info-label">Numéro de série</span>
                    <span class="recep-info-value info-value" id="modal-pc-serial">-</span>
                </div>
                <div class="recep-info-row info-row">
                    <span class="recep-info-label info-label">Marque</span>
                    <span class="recep-info-value info-value" id="modal-pc-brand">-</span>
                </div>
                <div class="recep-info-row info-row">
                    <span class="recep-info-label info-label">Modèle</span>
                    <span class="recep-info-value info-value" id="modal-pc-model">-</span>
                </div>
                <div class="recep-info-row info-row">
                    <span class="recep-info-label info-label">OS</span>
                    <span class="recep-info-value info-value" id="modal-pc-os">-</span>
                </div>
                <div class="recep-info-row info-row">
                    <span class="recep-info-label info-label">Type</span>
                    <span class="recep-info-value info-value" id="modal-pc-type">-</span>
                </div>
                <div class="recep-info-row info-row">
                    <span class="recep-info-label info-label">Entrée</span>
                    <span class="recep-info-value info-value" id="modal-pc-entry">-</span>
                </div>
                <div class="recep-info-row info-row">
                    <span class="recep-info-label info-label">Date du changement</span>
                    <span class="recep-info-value info-value" id="modal-pc-date-changed">-</span>
                </div>
            </div>
            <form id="form-edit-pc">
                <div class="form-group">
                    <label for="modal-pc-state"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> État</label>
                    <select id="modal-pc-state" name="state" required>
                        <option value="Reconditionnés">Reconditionnés</option>
                        <option value="Pour pièces">Pour pièces</option>
                        <option value="HS">HS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="modal-pc-os-select"><i class="fa-solid fa-desktop" aria-hidden="true"></i> OS</label>
                    <select id="modal-pc-os-select" name="os">
                        <option value="linux" selected>Linux</option>
                        <option value="windows">Windows</option>
                        <option value="chrome">Chrome OS</option>
                        <option value="apple">Apple</option>
                        <option value="android">Android</option>
                        <option value="bsd">BSD</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="modal-pc-technician"><i class="fa-solid fa-user" aria-hidden="true"></i> Technicien</label>
                    <input type="text" id="modal-pc-technician" name="technician" placeholder="Prénom du technicien" autocomplete="off">
                    <small class="form-help">Saisie libre du prénom</small>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="modal-cancel-btn" data-modal-close="modal-edit-pc" title="Annuler les modifications">Annuler</button>
            <button type="button" class="modal-submit-btn" id="btn-save-pc-edit" title="Enregistrer"><i class="fa-solid fa-save" aria-hidden="true"></i> Enregistrer</button>
        </div>
    </div>
</dialog>
