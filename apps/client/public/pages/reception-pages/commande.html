<section class="recep-page commande-container">
    <div class="recep-card-body">
        <p class="recep-card-desc"><i class="recep-desc-icon fa-solid fa-info-circle" aria-hidden="true"></i> Constituer une liste de produits et générer le PDF.</p>
        <div class="recep-panel">
            <div class="recep-toolbar commande-toolbar">
                <div class="recep-toolbar-field">
                    <label class="recep-label" for="commande-name"><i class="fa-solid fa-file-lines"></i> Nom de la commande</label>
                    <input class="recep-input" type="text" id="commande-name" placeholder="Ex : Commande fournitures mars 2025" maxlength="255" autocomplete="off">
                </div>
                <div class="recep-toolbar-actions commande-actions">
                    <button type="button" class="recep-btn recep-btn-secondary" id="commande-btn-add-line" title="Ajouter une ligne">Ajouter une ligne</button>
                    <button type="button" class="recep-btn" id="commande-btn-add-product" title="Ajouter un produit">Ajouter un produit</button>
                    <button type="button" class="recep-btn recep-btn-primary" id="commande-btn-save-pdf" title="Enregistrer le PDF">Enregistrer</button>
                </div>
            </div>
            <div class="recep-table-wrap commande-table-wrapper">
                <table class="recep-table commande-table" id="commande-table">
                    <thead>
                        <tr>
                            <th class="col-num"><i class="fa-solid fa-hashtag"></i> N°</th>
                            <th class="col-produit"><i class="fa-solid fa-box"></i> Produit</th>
                            <th class="col-quantite"><i class="fa-solid fa-sort-numeric-up"></i> Quantité</th>
                            <th class="col-prix"><i class="fa-solid fa-euro-sign"></i> Prix</th>
                            <th class="col-liens"><i class="fa-solid fa-link"></i> Liens</th>
                            <th class="col-actions"><i class="fa-solid fa-screwdriver-wrench"></i></th>
                        </tr>
                    </thead>
                    <tbody id="commande-tbody">
                        <tr class="commande-line" data-line-index="0">
                            <td class="col-num">1</td>
                            <td class="col-produit"><select class="commande-select-product recep-input" data-line="0"><option value="">— Produit —</option></select></td>
                            <td class="col-quantite"><input type="number" min="0" step="1" class="commande-input-quantite recep-input" data-line="0" placeholder="0"></td>
                            <td class="col-prix"><input type="number" min="0" step="0.01" class="commande-input-prix recep-input" data-line="0" placeholder="0,00"></td>
                            <td class="col-liens"><input type="text" class="commande-input-lien recep-input" data-line="0" placeholder="URL"></td>
                            <td class="col-actions"><button type="button" class="recep-btn-icon btn-remove-line" data-line="0" title="Supprimer" disabled><i class="fas fa-trash" aria-hidden="true"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>

<dialog class="universal-modal" id="commande-modal-add-product" data-modal-id="commande-modal-add-product">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fa-solid fa-plus"></i> Ajouter un produit</h2>
            <button type="button" class="modal-close-btn" data-modal-close="commande-modal-add-product" aria-label="Fermer"><i class="fa-solid fa-times" aria-hidden="true"></i></button>
        </div>
        <div class="modal-body">
            <form id="commande-form-add-product">
                <div class="form-group">
                    <label for="commande-new-product-name">Nom du produit</label>
                    <input type="text" id="commande-new-product-name" placeholder="Ex : Câble HDMI 2m" required autocomplete="off">
                </div>
                <div class="modal-actions">
                    <button type="button" class="recep-btn recep-btn-secondary" data-close-modal="commande-modal-add-product">Annuler</button>
                    <button type="submit" class="recep-btn recep-btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</dialog>
