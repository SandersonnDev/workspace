# Build client (Electron) sur push main → artefacts + GitHub Release pour mise à jour auto
# Pour la publication Release : le secret doit s'appeler GH_TOKEN ou GITHUB_TOKEN (ou adapter les env ci‑dessous).
name: Build & Publish Client

on:
  push:
    branches: [main]
    paths:
      - 'apps/client/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plateforme à builder'
        required: true
        default: 'all'
        type: choice
        options:
          - linux
          - win
          - mac
          - all

jobs:
  build-linux:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm ci

      - name: Build client (Linux) & publish
        working-directory: apps/client
        env:
          # Remplacer par votre nom de secret si différent (ex. secrets.PAT)
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_ENV: production
        run: npm run build:prod:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-linux
          path: apps/client/dist/

  build-windows:
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'win' || github.event.inputs.platform == 'all'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm ci

      - name: Build client (Windows) & publish
        working-directory: apps/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_ENV: production
        run: npm run build:prod:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: apps/client/dist/

  build-macos:
    runs-on: macos-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'mac' || github.event.inputs.platform == 'all'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm ci

      - name: Build client (macOS) & publish
        working-directory: apps/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_ENV: production
        run: npm run build:prod:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-macos
          path: apps/client/dist/
