# Build client (Electron) sur push main → artefacts + GitHub Release pour mise à jour auto
#
# Publication (Release) : faite UNIQUEMENT ici en CI. Le token doit avoir les droits d'écriture (créer une release).
# - Soit un secret GH_TOKEN (Personal Access Token avec scope "repo") dans Settings > Secrets and variables > Actions.
# - Soit GITHUB_TOKEN (automatique) si le dépôt autorise "Read and write permissions" dans Settings > Actions > General.
# En local : "npm run build:linux" ou "build:prod:linux:local" — aucun token nécessaire.
name: Build & Publish Client

on:
  push:
    branches: [main]
    paths:
      - 'apps/client/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plateforme à builder'
        required: true
        default: 'all'
        type: choice
        options:
          - linux
          - win
          - mac
          - all

jobs:
  build-linux:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm ci

      - name: Vérifier token de publication
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ] && [ -z "${GITHUB_TOKEN}" ]; then
            echo "::error::Aucun token GitHub. Ajoutez un secret GH_TOKEN (PAT avec scope repo) dans Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Token de publication configuré."

      - name: Build client (Linux) & publish
        working-directory: apps/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_ENV: production
        run: npm run build:prod:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-linux
          path: apps/client/dist/

  build-windows:
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'win' || github.event.inputs.platform == 'all'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm ci

      - name: Vérifier token de publication
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN -and -not $env:GITHUB_TOKEN) {
            Write-Error "Aucun token GitHub. Ajoutez un secret GH_TOKEN (PAT avec scope repo) dans Settings > Secrets and variables > Actions."
            exit 1
          }
          echo "Token de publication configuré."

      - name: Build client (Windows) & publish
        working-directory: apps/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_ENV: production
        run: npm run build:prod:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: apps/client/dist/

  build-macos:
    runs-on: macos-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'mac' || github.event.inputs.platform == 'all'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm ci

      - name: Vérifier token de publication
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ] && [ -z "${GITHUB_TOKEN}" ]; then
            echo "::error::Aucun token GitHub. Ajoutez un secret GH_TOKEN (PAT avec scope repo) dans Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Token de publication configuré."

      - name: Build client (macOS) & publish
        working-directory: apps/client
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production
        run: npm run build:prod:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-macos
          path: apps/client/dist/
